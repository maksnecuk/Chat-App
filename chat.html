<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Room</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <header id="headerChat" class="card">
      <div id="headerNickname"></div>
      <div id="headerRoomName"></div>
      <div>
        <button id="logOutButton" class="image-button">
          <svg
            fill="currentColor"
            height="24px"
            width="24px"
            version="1.1"
            id="Layer_1"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 512 512"
            xml:space="preserve"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
            <g id="SVGRepo_iconCarrier">
              <g>
                <g>
                  <path
                    d="M358.401,192V12.8c0-7.066-5.734-12.8-12.8-12.8h-332.8c-7.066,0-12.8,5.734-12.8,12.8v486.4 c0,7.066,5.734,12.8,12.8,12.8h332.8c7.066,0,12.8-5.734,12.8-12.8V320h-25.6v166.4h-307.2V25.6h307.2V192H358.401z"
                  ></path>
                </g>
              </g>
              <g>
                <g>
                  <path
                    d="M508.161,246.844l-74.931-76.595c-4.941-5.06-13.047-5.146-18.099-0.205c-5.052,4.941-5.146,13.056-0.205,18.099 l53.854,55.057H193.673c-7.066,0-12.8,5.734-12.8,12.8c0,7.066,5.734,12.8,12.8,12.8h275.098l-53.854,55.057 c-4.941,5.043-4.847,13.158,0.205,18.099c5.06,4.941,13.158,4.855,18.099-0.205l75.128-76.8 C513.289,259.9,513.204,251.785,508.161,246.844z"
                  ></path>
                </g>
              </g>
            </g>
          </svg>
        </button>
      </div>
    </header>
    <div class="chat-layout">
      <div id="chatContainer"></div>

      <div class="card message-form-card">
        <form id="messageForm">
          <div class="input-group" style="margin-bottom: 0">
            <label for="message" style="display: none">Deine Nachricht:</label>
            <div style="display: flex; gap: 10px">
              <div class="inputWrapper">
                <input type="text" id="message" class="message-input" placeholder="Deine Nachricht" required />

                <button type="button" id="imageButton" class="image-button">
                  <svg
                    class="humbleicons hi-plus-circle"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <g stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" d="M12 16V8m4 4H8" />
                      <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </g>
                  </svg>
                </button>

                <input type="file" id="imageInput" hidden accept=".jpg, .jpeg, .png" />
              </div>
              <div class="button-group button-group--onInput">
                <button type="submit" class="button submit-button">Send</button>
                <button id="cancelButton" type="reset" class="button submit-button cancel-button is-hidden">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="src/chat.ts"></script>
  </body>
</html>
