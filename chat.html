<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Room</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <header></header>
    <div class="chat-layout">
      <div id="chatContainer"></div>

      <div class="card message-form-card">
        <form id="messageForm">
          <div class="input-group" style="margin-bottom: 0">
            <label for="message" style="display: none">Deine Nachricht:</label>
            <div style="display: flex; gap: 10px">
              <div class="inputWrapper">
                <input type="text" id="message" class="message-input" placeholder="Deine Nachricht" required />

                <button type="button" id="imageButton" class="image-button">
                  <svg
                    class="humbleicons hi-plus-circle"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <g stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" d="M12 16V8m4 4H8" />
                      <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </g>
                  </svg>
                </button>

                <input type="file" id="imageInput" hidden accept=".jpg, .jpeg, .png" />
              </div>
              <div class="button-group button-group--onInput">
                <button type="submit" class="button submit-button">Send</button>
                <button id="cancelButton" type="reset" class="button submit-button cancel-button is-hidden">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="src/chat.ts"></script>
  </body>
</html>
