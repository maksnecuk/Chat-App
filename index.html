<!doctype html>
<html lang="en">
  <head>

    <title>ChatApp - Users</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <main id="mainBackground">
      <section class="card">
        <h2>Dein Profil</h2>

        </form>
        <script type="module" src="src/userRegistration.ts"></script>
      </section>

  </body>
